services:
  mongo:
    image: mongo:7
    container_name: milestone-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      # Root user credentials for local development only.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-rootpass}
      # Initial database name created by Mongo image.
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-milestone}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: milestone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milestone-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      solr:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT:-9000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SESSION_SECRET: ${SESSION_SECRET:-dev_session_secret_change_me}

      # Backend app connection string used in database.js.
      MONGO_URL: ${MONGO_URL:-mongodb://root:rootpass@mongo:27017/milestone?authSource=admin}

      # Redis connection URL (Hardcoded for docker network)
      REDIS_URL: redis://redis:6379

      # Solr connection (Docker network hostname)
      SOLR_BASE_URL: http://solr:8983/solr
      SOLR_CORE_JOBS: jobs
      SOLR_CORE_BLOGS: blogs

      # External service credentials (optional in local setup).
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    volumes:
      # Keep runtime-generated files persisted between container restarts.
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  solr:
    image: solr:9
    container_name: milestone-solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
      - ./solr/configsets:/opt/solr/server/solr/configsets/milestone
    command: >
      bash -c "
        precreate-core jobs /opt/solr/server/solr/configsets/milestone;
        precreate-core blogs /opt/solr/server/solr/configsets/milestone;
        exec solr-foreground
      "
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8983/solr/jobs/admin/ping || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../Milestone-frontend
      dockerfile: Dockerfile
      args:
        # Build-time URL consumed by Vite for API/GraphQL/socket calls.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:9000}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9000}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
    container_name: milestone-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  mongo_data:
  redis_data:
  solr_data:
